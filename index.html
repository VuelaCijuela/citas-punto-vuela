<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cita Previa - Punto Vuela</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white shadow-2xl rounded-3xl w-full max-w-2xl p-8">

    <!-- CABECERA OFICIAL -->
    <div class="text-center border-b pb-6 mb-6">
      <h1 class="text-3xl font-bold text-blue-800">
        Sistema de Cita Previa
      </h1>
      <p class="text-slate-500 mt-2">
        Punto Vuela - Administración Digital
      </p>
    </div>

    <!-- PROGRESO -->
    <div class="mb-6 text-sm text-slate-500">
      Paso <span id="stepText">1</span> de 2
    </div>

    <!-- FORMULARIO -->
    <form id="form" action="https://formspree.io/f/TU_ID" method="POST" class="space-y-5">

      <!-- PASO 1 -->
      <div id="step1" class="space-y-4">

        <input type="text" name="nombre" placeholder="Nombre completo" required
          class="w-full border rounded-xl p-3"/>

        <input type="tel" name="telefono" placeholder="Teléfono móvil" required
          class="w-full border rounded-xl p-3"/>

        <input type="email" name="email" placeholder="Correo electrónico" required
          class="w-full border rounded-xl p-3"/>

        <button type="button" onclick="nextStep()"
          class="w-full bg-blue-700 text-white font-bold rounded-xl p-3">
          Continuar
        </button>

      </div>

      <!-- PASO 2 -->
      <div id="step2" class="hidden space-y-4">

        <select name="servicio" required class="w-full border rounded-xl p-3">
          <option value="">Selecciona servicio</option>
          <option>Certificado digital</option>
          <option>Cl@ve</option>
          <option>SEPE</option>
          <option>Seguridad Social</option>
          <option>Soporte informático</option>
        </select>

        <div class="grid grid-cols-2 gap-3">

          <input type="date" name="fecha" required class="border rounded-xl p-3"/>

          <select name="hora" required class="border rounded-xl p-3">
            <option value="">Hora</option>
            <option>09:00</option>
            <option>09:30</option>
            <option>10:00</option>
            <option>10:30</option>
            <option>11:00</option>
            <option>11:30</option>
            <option>12:00</option>
          </select>

        </div>

        <textarea name="mensaje" rows="3"
          placeholder="Observaciones (opcional)"
          class="w-full border rounded-xl p-3"></textarea>

        <button id="btn"
          type="submit"
          class="w-full bg-green-700 hover:bg-green-800 text-white font-bold rounded-xl p-3">
          Confirmar cita
        </button>

        <button type="button" onclick="prevStep()"
          class="w-full bg-slate-200 rounded-xl p-3">
          Volver
        </button>

      </div>

      <!-- MENSAJE FINAL -->
      <div id="msg" class="text-center mt-4"></div>

      <!-- anti bots -->
      <input type="text" name="_gotcha" style="display:none">

    </form>

  </div>

  <script>
    let step = 1;

    function nextStep() {
      document.getElementById("step1").classList.add("hidden");
      document.getElementById("step2").classList.remove("hidden");
      document.getElementById("stepText").innerText = "2";
      step = 2;
    }

    function prevStep() {
      document.getElementById("step2").classList.add("hidden");
      document.getElementById("step1").classList.remove("hidden");
      document.getElementById("stepText").innerText = "1";
      step = 1;
    }

    const form = document.getElementById("form");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    form.addEventListener("submit", async (e) => {
  e.preventDefault();

  btn.disabled = true;
  btn.innerText = "Enviando solicitud...";

  const formData = new FormData(form);

  const data = {
    nombre: formData.get("nombre"),
    telefono: formData.get("telefono"),
    email: formData.get("email"),
    servicio: formData.get("servicio"),
    fecha: formData.get("fecha"),
    hora: formData.get("hora"),
    mensaje: formData.get("mensaje")
  };

  try {

    const response = await fetch("https://script.google.com/macros/s/AKfycbzpWkiinBHRBGHDY5AOyXFAoCP3RU2TFzLiQ5YxgLYhS5jZN_hW1S2GDh1uDUa0FVej2g/exec", {
      method: "POST",
      body: new URLSearchParams(data)
    });

    const result = await response.text();
    console.log(result);

    msg.innerHTML = `
      <div class="bg-green-100 text-green-800 p-4 rounded-xl mt-4">
        <h2 class="font-bold text-lg">Solicitud registrada</h2>
        <p>Su cita ha sido guardada correctamente.</p>
        <p class="text-sm mt-2">Quedará registrada en el sistema.</p>
      </div>
    `;

    form.reset();

  } catch (error) {

    msg.innerHTML = `
      <div class="bg-red-100 text-red-700 p-4 rounded-xl mt-4">
        ❌ Error al guardar la cita
      </div>
    `;

  } finally {
    btn.disabled = false;
    btn.innerText = "Confirmar cita";
  }
});
  </script>

</body>
</html>
